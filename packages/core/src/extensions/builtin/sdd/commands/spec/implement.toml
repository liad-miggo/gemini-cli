description = "Executes the tasks defined in the specified spec's plan"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Spec-Driven Development (SDD) framework. Your current task is to implement a spec. You MUST follow this protocol precisely.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt the current operation immediately, announce the failure to the user, and await further instructions.

---

## 1.1 SETUP CHECK
**PROTOCOL: Verify that the SDD environment is properly set up.**

1.  **Verify Core Context:** Using the **Universal File Resolution Protocol**, resolve and verify the existence of:
    -   **Product Definition**
    -   **Tech Stack**
    -   **Workflow**

2.  **Handle Failure:** If ANY of these are missing (or their resolved paths do not exist), Announce: "SDD is not set up. Please run `/spec:setup`." and HALT.


---

## 2.0 SPEC SELECTION
**PROTOCOL: Identify and select the spec to be implemented.**

1.  **Check for User Input:** First, check if the user provided a spec name as an argument (e.g., `/spec:implement <spec_description>`).

2.  **Locate and Parse Spec Registry:**
    -   Resolve the **Spec Registry**.
    -   Read and parse this file. You must parse the file by splitting its content by the `---` separator to identify each spec section. For each section, extract the status (`[ ]`, `[~]`, `[x]`), the spec description (from the `##` heading), and the link to the spec folder.
    -   **CRITICAL:** If no spec sections are found after parsing, announce: "The specs file is empty or malformed. No specs to implement." and halt.

3.  **Continue:** Immediately proceed to the next step to select a spec.

4.  **Select Spec:**
    -   **If a spec name was provided:**
        1.  Perform an exact, case-insensitive match for the provided name against the spec descriptions you parsed.
        2.  If a unique match is found, immediately call the `ask_user` tool to confirm the selection (do not repeat the question in the chat):
            - **questions:**
                - **header:** "Confirm"
                - **question:** "I found spec '<spec_description>'. Is this correct?"
                - **type:** "yesno"
        3.  If no match is found, or if the match is ambiguous, immediately call the `ask_user` tool to inform the user and request the correct spec name (do not repeat the question in the chat):
            - **questions:**
                - **header:** "Clarify"
                - **question:** "I couldn't find a unique spec matching the name you provided. Did you mean '<next_available_spec>'? Or please type the exact spec name."
                - **type:** "text"
    -   **If no spec name was provided (or if the previous step failed):**
        1.  **Identify Next Spec:** Find the first spec in the parsed specs file that is NOT marked as `[x] Completed`.
        2.  **If a next spec is found:**
            -   Immediately call the `ask_user` tool to confirm the selection (do not repeat the question in the chat):
                - **questions:**
                    - **header:** "Next Spec"
                    - **question:** "No spec name provided. Would you like to proceed with the next incomplete spec: '<spec_description>'?"
                    - **type:** "yesno"
            -   If confirmed, proceed with this spec. Otherwise, immediately call the `ask_user` tool to request the correct spec name (do not repeat the question in the chat):
                - **questions:**
                    - **header:** "Clarify"
                    - **question:** "Please type the exact name of the spec you would like to implement."
                    - **type:** "text"
        3.  **If no incomplete specs are found:**
            -   Announce: "No incomplete specs found in the specs file. All tasks are completed!"
            -   Halt the process and await further user instructions.

5.  **Handle No Selection:** If no spec is selected, inform the user and await further instructions.

---

## 3.0 SPEC IMPLEMENTATION
**PROTOCOL: Execute the selected spec.**

1.  **Announce Action:** Announce which spec you are beginning to implement.

2.  **Update Status to 'In Progress':**
    -   Before beginning any work, you MUST update the status of the selected spec in the **Spec Registry** file.
    -   This requires finding the specific heading for the spec (e.g., `## [ ] Spec: <Description>`) and replacing it with the updated status (e.g., `## [~] Spec: <Description>`) in the **Spec Registry** file you identified earlier.

3.  **Load Spec Context:**
    a. **Identify Spec Folder:** From the specs file, identify the spec's folder link to get the `<spec_id>`.
    b. **Read Files:**
        -   **Spec Context:** Using the **Universal File Resolution Protocol**, resolve and read the **Specification** and **Implementation Plan** for the selected spec.
        -   **Workflow:** Resolve **Workflow** (via the **Universal File Resolution Protocol** using the project's index file).
    c. **Error Handling:** If you fail to read any of these files, you MUST stop and inform the user of the error.

4.  **Execute Tasks and Update Spec Plan:**
    a. **Announce:** State that you will now execute the tasks from the spec's **Implementation Plan** by following the procedures in the **Workflow**.
    b. **Iterate Through Tasks:** You MUST now loop through each task in the spec's **Implementation Plan** one by one.
    c. **For Each Task, You MUST:**
        i. **Defer to Workflow:** The **Workflow** file is the **single source of truth** for the entire task lifecycle. You MUST now read and execute the procedures defined in the "Task Workflow" section of the **Workflow** file you have in your context. Follow its steps for implementation, testing, and committing precisely.
           - **CRITICAL:** Every human-in-the-loop interaction, confirmation, or request for feedback mentioned in the **Workflow** (e.g., manual verification plans or guidance on persistent failures) MUST be conducted using the `ask_user` tool.

5.  **Finalize Spec:**
    -   After all tasks in the spec's local **Implementation Plan** are completed, you MUST update the spec's status in the **Spec Registry**.
    -   This requires finding the specific heading for the spec (e.g., `## [~] Spec: <Description>`) and replacing it with the completed status (e.g., `## [x] Spec: <Description>`).
    -   **Commit Changes:** Stage the **Spec Registry** file and commit with the message `chore(sdd): Mark spec '<spec_description>' as complete`.
    -   Announce that the spec is fully complete and the specs file has been updated.

---

## 4.0 SYNCHRONIZE PROJECT DOCUMENTATION
**PROTOCOL: Update project-level documentation based on the completed spec.**

1.  **Execution Trigger:** This protocol MUST only be executed when a spec has reached a `[x]` status in the specs file. DO NOT execute this protocol for any other spec status changes.

2.  **Announce Synchronization:** Announce that you are now synchronizing the project-level documentation with the completed spec's specifications.

3.  **Load Specification:** Read the spec's **Specification**.

4.  **Load Project Documents:**
    -   Resolve and read:
        -   **Product Definition**
        -   **Tech Stack**
        -   **Product Guidelines**

5.  **Analyze and Update:**
    a.  **Analyze Specification:** Carefully analyze the **Specification** to identify any new features, changes in functionality, or updates to the technology stack.
    b.  **Update Product Definition:**
        i. **Condition for Update:** Based on your analysis, you MUST determine if the completed feature or bug fix significantly impacts the description of the product itself.
        ii. **Propose and Confirm Changes:** If an update is needed:
            -   **Ask for Approval:** Use the `ask_user` tool to request confirmation. You MUST embed the proposed updates (in a diff format) directly into the `question` field so the user can review them in context.
                - **questions:**
                    - **header:** "Product"
                    - **question:**
                        Please review the proposed updates to the Product Definition below. Do you approve?

                        ---

                        <Insert Proposed product.md Updates/Diff Here>
                    - **type:** "yesno"
        iii. **Action:** Only after receiving explicit user confirmation, perform the file edits to update the **Product Definition** file. Keep a record of whether this file was changed.
    c.  **Update Tech Stack:**
        i. **Condition for Update:** Similarly, you MUST determine if significant changes in the technology stack are detected as a result of the completed spec.
        ii. **Propose and Confirm Changes:** If an update is needed:
            -   **Ask for Approval:** Use the `ask_user` tool to request confirmation. You MUST embed the proposed updates (in a diff format) directly into the `question` field so the user can review them in context.
                - **questions:**
                    - **header:** "Tech Stack"
                    - **question:**
                        Please review the proposed updates to the Tech Stack below. Do you approve?

                        ---

                        <Insert Proposed tech-stack.md Updates/Diff Here>
                    - **type:** "yesno"
        iii. **Action:** Only after receiving explicit user confirmation, perform the file edits to update the **Tech Stack** file. Keep a record of whether this file was changed.
    d. **Update Product Guidelines (Strictly Controlled):**
        i. **CRITICAL WARNING:** This file defines the core identity and communication style of the product. It should be modified with extreme caution and ONLY in cases of significant strategic shifts, such as a product rebrand or a fundamental change in user engagement philosophy. Routine feature updates or bug fixes should NOT trigger changes to this file.
        ii. **Condition for Update:** You may ONLY propose an update to this file if the spec's **Specification** explicitly describes a change that directly impacts branding, voice, tone, or other core product guidelines.
        iii. **Propose and Confirm Changes:** If the conditions are met:
            -   **Ask for Approval:** Use the `ask_user` tool to request confirmation. You MUST embed the proposed changes (in a diff format) directly into the `question` field, including a clear warning.
                - **questions:**
                    - **header:** "Product"
                    - **question:**
                        WARNING: This is a sensitive action as it impacts core product guidelines. Please review the proposed changes below. Do you approve these critical changes?

                        ---

                        <Insert Proposed product-guidelines.md Updates/Diff Here>
                    - **type:** "yesno"
        iv. **Action:** Only after receiving explicit user confirmation, perform the file edits. Keep a record of whether this file was changed.

6.  **Final Report:** Announce the completion of the synchronization process and provide a summary of the actions taken.
    - **Construct the Message:** Based on the records of which files were changed, construct a summary message.
    - **Commit Changes:**
        - If any files were changed (**Product Definition**, **Tech Stack**, or **Product Guidelines**), you MUST stage them and commit them.
        - **Commit Message:** `docs(sdd): Synchronize docs for spec '<spec_description>'`
    - **Example (if Product Definition was changed, but others were not):**
        > "Documentation synchronization is complete.
        > - **Changes made to Product Definition:** The user-facing description of the product was updated to include the new feature.
        > - **No changes needed for Tech Stack:** The technology stack was not affected.
        > - **No changes needed for Product Guidelines:** Core product guidelines remain unchanged."
    - **Example (if no files were changed):**
        > "Documentation synchronization is complete. No updates were necessary for project documents based on the completed spec."

---

## 5.0 SPEC CLEANUP
**PROTOCOL: Offer to archive or delete the completed spec.**

1.  **Execution Trigger:** This protocol MUST only be executed after the current spec has been successfully implemented and the `SYNCHRONIZE PROJECT DOCUMENTATION` step is complete.

2.  **Ask for User Choice:** Immediately call the `ask_user` tool to prompt the user (do not repeat the question in the chat):
    - **questions:**
        - **header:** "Spec Cleanup"
        - **question:** "Spec '<spec_description>' is now complete. What would you like to do?"
        - **type:** "choice"
        - **multiSelect:** false
        - **options:**
            - Label: "Review", Description: "Run the review command to verify changes before finalizing."
            - Label: "Archive", Description: "Move the spec's folder to `.gemini/specs/archive/` and remove it from the specs file."
            - Label: "Delete", Description: "Permanently delete the spec's folder and remove it from the specs file."
            - Label: "Skip", Description: "Do nothing and leave it in the specs file."

3.  **Handle User Response:**
    *   **If user chooses "Review":**
        *   Announce: "Please run `/spec:review` to verify your changes. You will be able to archive or delete the spec after the review."
    *   **If user chooses "Archive":**
        i.   **Create Archive Directory:** Check for the existence of `.gemini/specs/archive/`. If it does not exist, create it.
        ii.  **Archive Spec Folder:** Move the spec's folder from its current location (resolved via the **Spec Directory**) to `.gemini/specs/archive/<spec_id>`.
        iii. **Remove from Specs File:** Read the content of the **Spec Registry** file, remove the entire section for the completed spec (the part that starts with `---` and contains the spec description), and write the modified content back to the file.
        iv.  **Commit Changes:** Stage the **Spec Registry** file and `.gemini/specs/archive/`. Commit with the message `chore(sdd): Archive spec '<spec_description>'`.
        v.   **Announce Success:** Announce: "Spec '<spec_description>' has been successfully archived."
    *   **If user chooses "Delete":**
        i. **CRITICAL WARNING:** Before proceeding, immediately call the `ask_user` tool to ask for final confirmation (do not repeat the warning in the chat):
            - **questions:**
                - **header:** "Confirm"
                - **question:** "WARNING: This will permanently delete the spec folder and all its contents. This action cannot be undone. Are you sure?"
                - **type:** "yesno"
        ii. **Handle Confirmation:**
            - **If 'yes'**:
                a. **Delete Spec Folder:** Resolve the **Spec Directory** and permanently delete the spec's folder from `<Spec Directory>/<spec_id>`.
                b. **Remove from Specs File:** Read the content of the **Spec Registry** file, remove the entire section for the completed spec, and write the modified content back to the file.
                c. **Commit Changes:** Stage the **Spec Registry** file and the deletion of the spec directory. Commit with the message `chore(sdd): Delete spec '<spec_description>'`.
                d. **Announce Success:** Announce: "Spec '<spec_description>' has been permanently deleted."
            - **If 'no'**:
                a. **Announce Cancellation:** Announce: "Deletion cancelled. The spec has not been changed."
    *   **If user chooses "Skip":**
        *   Announce: "Okay, the completed spec will remain in your specs file for now."
"""