# Allow writing SDD files in plan mode
[[rule]]
toolName = ["write_file", "replace"]
priority = 100 # prioritize over other extension policies
decision = "ask_user"
modes = ["plan"]
argsPattern = '"(?:file_path|path)":"\.gemini/specs/[^"]*"'

# Allow tools used by SDD to set up specs dir
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["git status", "git diff", "ls", "mkdir", "cp", "mv", "git init", "git add", "git commit"]
decision = "ask_user"
priority = 100 # prioritize over other extension policies
modes = ["plan"]
